        content="Portfolio of Bimal Thapa, a freelance AI engineer & web designer creating high-end, intelligent digital products.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>


    <!-- Navigation Header -->
    <header class="nav-container">
        <div class="nav-logo magnetic" data-strength="15">
            <a href="#hero" class="nav-logo-link">
                <span class="logo-circle"></span>
                <span class="logo-text">© Code by Bimal</span>
            </a>
        </div>
        <nav class="nav-links">
            <div class="nav-link-wrapper magnetic" data-strength="20">
                <a href="index.html#work" class="nav-link">Work</a>
            </div>
            <div class="nav-link-wrapper magnetic" data-strength="20">
                <a href="about.html" class="nav-link">About</a>
            </div>
            <div class="nav-link-wrapper magnetic" data-strength="20">
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
        </nav>

        <!-- Sticky Menu Button (visible when scrolling down) -->
        <div class="menu-toggle-btn magnetic" id="menu-toggle-btn" data-strength="25">
            <div class="menu-btn-icon">
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-content">
        <!-- Contact Page Content -->
        <section class="contact-page-section" id="contact">
            <div class="section-container">
                <div class="contact-page-header">
                    <div class="footer-portrait-mini">
                        <img src="assets/images/me.png" alt="Bimal Mini Portrait">
                    </div>
                    <h2>Let's work<br>together</h2>
                </div>
                <div class="contact-grid">

                    <!-- Left Column: Form -->
                    <div class="contact-form-col">
                        <form class="contact-form" action="#" method="POST">

                            <div class="form-group">
                                <span class="step-num">01</span>
                                <div class="input-wrapper">
                                    <label for="name">What's your name?</label>
                                    <input type="text" id="name" name="name" placeholder="John Doe *" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <span class="step-num">02</span>
                                <div class="input-wrapper">
                                    <label for="email">What's your email?</label>
                                    <input type="email" id="email" name="email" placeholder="john@doe.com *" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <span class="step-num">03</span>
                                <div class="input-wrapper">
                                    <label for="organization">What's the name of your organization?</label>
                                    <input type="text" id="organization" name="organization" placeholder="John & Doe ®">
                                </div>
                            </div>

                            <div class="form-group">
                                <span class="step-num">04</span>
                                <div class="input-wrapper">
                                    <label for="services">What services are you looking for?</label>
                                    <input type="text" id="services" name="services"
                                        placeholder="Web Design, Web Development ...">
                                </div>
                            </div>

                            <div class="form-group">
                                <span class="step-num">05</span>
                                <div class="input-wrapper">
                                    <label for="message">Your message</label>
                                    <textarea id="message" name="message"
                                        placeholder="Hello Bimal, can you help me with ... *" required></textarea>
                                </div>
                            </div>

                            <div class="form-submit-container">
                                <div class="contact-btn-magnetic magnetic" data-strength="30">
                                    <button type="submit" class="contact-circle-btn">
                                        <span class="circle-btn-text">Send message</span>
                                        <span class="circle-btn-bg"></span>
                                    </button>
                                </div>
                            </div>

                        </form>
                    </div>

                    <!-- Right Column: Details -->
                    <div class="contact-info-col">

                        <div class="info-block">
                            <h5 class="info-title">CONTACT DETAILS</h5>
                            <a href="mailto:hello@bimal.com.np" class="info-link magnetic"
                                data-strength="10">bimalthapa777@gmail.com</a>
                            <a href="tel:+9779876543210" class="info-link magnetic" data-strength="10">+91
                                9346715077</a>
                        </div>

                        <div class="info-block">
                            <h5 class="info-title">SOCIALS</h5>
                            <div class="info-socials">

                                <a href="https://www.linkedin.com/in/bimal-thapa-94a2331b3/" target="_blank"
                                    class="social-link magnetic" data-strength="10">LinkedIn</a>
                                <a href="https://github.com/BimalThapa12" target="_blank" class="social-link magnetic"
                                    data-strength="10">GitHub</a>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Floating Navigation Menu Overlay -->
    <div class="menu-overlay" id="menu-overlay">
        <div class="menu-overlay-bg"></div>
        <div class="menu-overlay-content">
            <div class="menu-nav-container">
                <span class="menu-header">NAVIGATION</span>
                <div class="menu-border"></div>
                <nav class="menu-nav-links">
                    <a href="index.html" class="menu-nav-link">Home</a>
                    <a href="index.html#work" class="menu-nav-link">Work</a>
                    <a href="about.html" class="menu-nav-link">About</a>
                    <a href="contact.html" class="menu-nav-link">Contact</a>
                </nav>
            </div>
            <div class="menu-socials-container">
                <span class="menu-header">SOCIALS</span>
                <div class="menu-socials-links">
                    <a href="https://www.linkedin.com/in/bimal-thapa-94a2331b3/" target="_blank"
                        class="social-link magnetic" data-strength="10">LinkedIn</a>
                    <a href="https://github.com/BimalThapa12" target="_blank" class="social-link magnetic"
                        data-strength="10">GitHub</a>
                </div>
            </div>
        </div>
    </div>

    <!-- GSAP CDN Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>

</html>
